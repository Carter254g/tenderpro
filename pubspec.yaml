name: tenderpro_ai
description: TenderPro AI — Smart Tender Management for Contractors & Suppliers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Networking (Claude API)
  http: ^1.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

  # File handling
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  open_filex: ^4.3.4
  share_plus: ^7.2.2

  # UI / Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.9
  dotted_border: ^2.1.0

  # Charts & Tables
  fl_chart: ^0.66.2
  data_table_2: ^2.5.12

  # PDF generation
  pdf: ^3.10.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
