<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TenderPro AI — Smart Tender Management for Contractors &amp; Suppliers">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TenderPro AI">

  <!-- Favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">

  <title>TenderPro AI</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0D1B4B; /* Deep Navy — matches AppColors.primary */
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    /* Simple centered loading spinner shown before Flutter loads */
    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      gap: 20px;
    }
    #loading p {
      color: #F5A623;
      font-family: sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(245,166,35,0.3);
      border-top-color: #F5A623;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>TenderPro AI</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
