name: TenderPro AI — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.22.x'
  JAVA_VERSION: '17'

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint, analyse & unit test
  # ─────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test --coverage
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 7

  # ─────────────────────────────────────────────
  # 2. Android release APK + AAB
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --dart-define=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenderpro-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenderpro-release.aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  # ─────────────────────────────────────────────
  # 3. iOS build (no-codesign)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenderpro-ios.app
          path: build/ios/iphoneos/Runner.app
          retention-days: 14

  # ─────────────────────────────────────────────
  # 4. Flutter Web build + GitHub Pages deploy
  # ─────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build web
        run: |
          flutter build web --release \
            --web-renderer canvaskit \
            --dart-define=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: tenderpro-web
          path: build/web/
          retention-days: 14
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
